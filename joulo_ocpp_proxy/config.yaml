name: "Joulo OCPP Proxy"
version: "main"
slug: "joulo_ocpp_proxy"
description: "Home Assistant add-on for joulo-ocpp-proxy (unofficial, not affiliated with Joulo)."
url: "https://github.com/joulo-nl/joulo-ocpp-proxy"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
stage: stable
ports:
  9000/tcp: 9000
ports_description:
  9000/tcp: "OCPP WebSocket port"
watchdog: "tcp://[HOST]:[PORT:9000]"
options:
  primary_csms_url: ""
  secondary_csms_urls: []
  log_level: info
schema:
  primary_csms_url: "match(^wss?://.+)"
  secondary_csms_urls:
    - "match(^wss?://.+)"
  log_level: "list(debug|info|warn|error)"
